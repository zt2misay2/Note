site_name: Misay's Note
site_url: https://note.zt2misay2.cn

nav:
  - Home: index.md
  - Course:
      - Overview: course/index.md
      - 计算机组成原理: course/past/computation-structure.md
      - 数据库系统及安全: course/database/index.md
      - 人工智能: course/ai/index.md
  - Study:
      - Overview: study/index.md
  - Daily:
      - Overview: daily/index.md
theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - sane_lists
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
